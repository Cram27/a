                ca: { q: "Es retornen els diners si no assisteixo al taller o arribo tard?", a: "No es retornaran els diners." }
            },
            {
                category: "tickets",
                es: { q: "¿Se devuelve el dinero en el caso de que no pueda hacer uso de la entrada?", a: "No, la entrada es no reembolsable." },
                ca: { q: "Es retornen els diners en cas que no pugui fer ús de l'entrada?", a: "No, l'entrada no és reemborsable." }
            },
            {
                category: "general",
                es: { q: "¿Puedo llevar animales?", a: "Lamentablemente no está permitida la entrada de animales al recinto." },
                ca: { q: "Puc portar animals?", a: "Malauradament no està permesa l'entrada d'animals al recinte." }
            },
            {
                category: "general",
                es: { q: "¿Hay una edad mínima?", a: "No." },
                ca: { q: "Hi ha una edat mínima?", a: "No." }
            },
            {
                category: "logistics",
                es: { q: "¿Hay parking disponible?", a: "No. Pero hay un parking muy cerca del recinto." },
                ca: { q: "Hi ha pàrquing disponible?", a: "No. Però hi ha un pàrquing molt a prop del recinte." }
            },
            {
                category: "services",
                es: { q: "¿Hay sillas de ruedas disponibles para alquilar?", a: "No." },
                ca: { q: "Hi ha cadires de rodes disponibles per llogar?", a: "No." }
            },
            {
                category: "general",
                es: { q: "¿Qué medidas hay contra el COVID?", a: "La experiencia cumple con todas las normas sanitarias y de seguridad vigentes." },
                ca: { q: "Quines mesures hi ha contra el COVID?", a: "L'experiència compleix totes les normes sanitàries i de seguretat vigents." }
            }
        ];

        let currentLang = 'ca';

        function renderFAQs(filter = '') {
            const container = document.getElementById('faq-container');
            container.innerHTML = '';
            
            const categories = [...new Set(faqData.map(item => item.category))];
            
            categories.forEach(cat => {
                const categoryFiltered = faqData.filter(item => {
                    const data = item[currentLang];
                    return item.category === cat && 
                           (data.q.toLowerCase().includes(filter.toLowerCase()) || 
                            data.a.toLowerCase().includes(filter.toLowerCase()));
                });
                
                if (categoryFiltered.length > 0) {
                    const catTitle = document.createElement('h2');
                    catTitle.className = "text-2xl font-serif font-bold text-primary mt-12 mb-6 border-b-2 border-primary/20 pb-2";
                    catTitle.textContent = translations[currentLang][`category_${cat}`];
                    container.appendChild(catTitle);
                    
                    categoryFiltered.forEach(item => {
                        const data = item[currentLang];
                        const faqItem = document.createElement('div');
                        faqItem.className = "faq-item";
                        faqItem.innerHTML = `
                            <div class="faq-trigger" onclick="this.parentElement.classList.toggle('active')">
                                <h3 class="font-bold pr-8">${data.q}</h3>
                                <span class="material-symbols-outlined faq-icon transition-transform">expand_more</span>
                            </div>
                            <div class="faq-content">
                                <p class="text-gray-600 dark:text-gray-400 leading-relaxed">${data.a}</p>
                            </div>
                        `;
                        container.appendChild(faqItem);
                    });
                }
            });
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            
            // Update UI elements with data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.innerHTML = translations[lang][key];
            });
            
            // Update placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[lang][key]) el.placeholder = translations[lang][key];
            });
            
            // Toggle lang active class
            document.getElementById('lang-ca').style.opacity = lang === 'ca' ? '1' : '0.5';
            document.getElementById('lang-es').style.opacity = lang === 'es' ? '1' : '0.5';
            
            renderFAQs(document.getElementById('faq-search').value);
        }

        function toggleArtisticMenu() {
            const overlay = document.getElementById('mobile-overlay');
            const isHidden = overlay.classList.contains('hidden');

            if (isHidden) {
                overlay.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
                setTimeout(() => {
                    overlay.classList.add('opacity-100');
                    overlay.classList.remove('opacity-0');
                }, 10);
            } else {
                overlay.classList.remove('opacity-100');
                overlay.classList.add('opacity-0');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    document.body.style.overflow = '';
                }, 500);
            }
        }

        document.getElementById('mobile-menu-button').addEventListener('click', toggleArtisticMenu);
        document.getElementById('close-mobile-menu').addEventListener('click', toggleArtisticMenu);

        document.getElementById('faq-search').addEventListener('input', (e) => {
            renderFAQs(e.target.value);
        });

        // Scroll effect
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('main-nav');
            if (window.scrollY > 20) {
                nav.classList.add('nav-scrolled');
            }
        });

        // Initial render
        document.addEventListener('DOMContentLoaded', () => {
            const hostname = window.location.hostname;
            if (hostname.endsWith('.es')) {
                changeLanguage('es');
            } else {
                changeLanguage('ca');
            }
        });
    </script>
</body>
</html>
